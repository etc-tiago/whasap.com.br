name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/whasap
  CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: postgres://postgres:postgres@localhost:5432/whasap

jobs:
  quality:
    name: Lint, format, typecheck e build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format
        run: bun run format

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  test:
    name: Testes (integração + E2E)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: whasap
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Migrate database
        run: bun run db:migrate

      - name: Prepare web dev vars
        run: cp apps/web/.dev.vars.example apps/web/.dev.vars

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: bunx playwright install chromium --with-deps

      - name: Run tests
        run: bun run test
